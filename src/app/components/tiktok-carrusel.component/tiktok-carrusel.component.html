<section class="tiktok-section" id="tiktok">
  <h2>Comunidad & Tips en Redes</h2>
  <p>Sigue los consejos diarios de entrenamiento y recetas de <strong>@ainoamore_</strong></p>
  
  <div class="carousel-container">
    <button class="carousel-btn prev" (click)="prevVideo()">&#10094;</button>
    
    <div class="carousel-track">
      @for (video of visibleVideos; track video.id) {
        <div class="tiktok-card">
          <iframe [src]="video.url | safeHtml" class="tiktok-embed" allowfullscreen></iframe>
        </div>
      }
    </div>

    <button class="carousel-btn next" (click)="nextVideo()">&#10095;</button>
  </div>
</section>

<section class="tiktok-section" id="tiktok">
  <h2>Tips Diarios en TikTok</h2>
  <p>Consejos rápidos de entrenamiento y mitos de nutrición desmentidos.</p>
  
  <div class="carousel-container">
    <button class="carousel-btn prev" (click)="prevVideo()" aria-label="Video anterior">&#10094;</button>
    
    <div class="carousel-track">
      @for (video of visibleVideos; track video.id) {
        <div class="tiktok-card">
          <iframe [src]="video.url | safeHtml" class="tiktok-embed" allowfullscreen></iframe>
        </div>
      }
    </div>

    <button class="carousel-btn next" (click)="nextVideo()" aria-label="Siguiente video">&#10095;</button>
  </div>
</section>

<section class="recipes-section" id="recetas">
  <h2>Recetas Saludables & Nutritivas</h2>
  <p class="section-subtitle">Alimentación flexible estructurada para potenciar tu rendimiento sin pasar hambre.</p>

  <div class="filter-tabs">
    <button [class.active]="categoriaActiva === 'todos'" (click)="cambiarFiltro('todos')">Ver Todas</button>
    <button [class.active]="categoriaActiva === 'desayuno'" (click)="cambiarFiltro('desayuno')">Desayunos</button>
    <button [class.active]="categoriaActiva === 'almuerzo'" (click)="cambiarFiltro('almuerzo')">Almuerzos</button>
    <button [class.active]="categoriaActiva === 'cena'" (click)="cambiarFiltro('cena')">Cenas</button>
  </div>
  
  <div class="grid-container">
    @for (recipe of recetasFiltradas; track recipe.title) {
      <div class="card animate-card">
        <div class="card-img-wrapper">
          <img [src]="recipe.image" [alt]="recipe.title">
          <span class="tag">{{ recipe.categoryLabel }}</span>
        </div>
        <div class="card-content">
          <h3>{{ recipe.title }}</h3>
          <p>{{ recipe.description }}</p>
          <button class="link-more">Ver Receta Paso a Paso &rarr;</button>
        </div>
      </div>
    }
  </div>
</section>
